seed: 3407

data:
  ref_dir: /data/dataset/LoViF/Train/Ref
  dist_dir: /data/dataset/LoViF/Train/Dist
  score_file: /data/dataset/LoViF/Train/Train_scores.xlsx
  image_size: 224
  normalize_mean: [0.48145466, 0.4578275, 0.40821073]
  normalize_std: [0.26862954, 0.26130258, 0.27577711]

model:
  structure_backbone: vit_base_patch16_dinov3
  ablation_mode: full
  swin_name: swin_tiny_patch4_window7_224
  clip_name: clip_vit_l14_336
  num_classes: 6
  freeze_backbones: true
  swin_local_path: ""
  clip_local_dir: ""
  clip_local_files_only: false
  clip_interpolate_pos_encoding: true
  clip_mult_enabled: true
  clip_mult_replace_raw: true
  clip_mult_l2_norm: true
  bottleneck_dim: 256
  bottleneck_dropout: 0.5
  semantic_gate_enabled: true
  semantic_gate_mode: hard
  semantic_gate_threshold: 0.4
  semantic_gate_high_threshold: 0.5
  gate_logit_strength: 12.0
  soft_gate_logit_strength: 6.0

train:
  epochs: 10
  batch_size: 32
  num_workers: 4
  lr: 0.0002
  weight_decay: 0.01
  grad_clip: 1.0
  auto_resume: true
  pin_memory: true
  val_ratio: 0.05
  label_smoothing: 0
  loss_weight_ce: 1.0
  loss_weight_mse: 1.0

debug:
  log_every: 10
  print_batch_shapes: true
  log_gpu_mem: true

output:
  work_dir: /data/SIQAdn2/workdirs/siqa_dual_dinov3_clip
